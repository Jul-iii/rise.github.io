<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas Global de Residuos Textiles | Proyecto RISE</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Paleta de Colores */
        :root {
            --verde-oscuro: #1b4332;
            --verde-principal: #2e7d32;
            --verde-claro: #8bc34a;
            --fondo-claro: #f1f8e9;
            --texto-oscuro: #2d3748;
            --blanco: #ffffff;
        }

        body { 
            margin: 0; 
            padding: 0; 
            font-family: 'Montserrat', sans-serif;
            background-color: var(--fondo-claro);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* --- Encabezado --- */
        #header {
            background: linear-gradient(135deg, var(--verde-oscuro), var(--verde-principal));
            color: var(--blanco);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 1000;
        }
        
        .header-titles h1 { 
            margin: 0; 
            font-size: 22px; 
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--verde-claro);
        }
        
        .header-titles p { 
            margin: 4px 0 0 0; 
            font-size: 13px; 
            opacity: 0.9; 
        }
        
        .header-logo {
            font-size: 18px;
            font-weight: 600;
            border: 2px solid var(--verde-claro);
            padding: 5px 15px;
            border-radius: 20px;
        }

        /* --- Contenedor del Mapa --- */
        #map { 
            flex-grow: 1;
            width: 100%;
            z-index: 1;
        }

        /* --- Estilos Personalizados de Leaflet --- */
        .leaflet-popup-content-wrapper {
            background-color: var(--blanco) !important;
            color: var(--texto-oscuro) !important;
            border-radius: 12px !important;
            padding: 0 !important;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(27, 67, 50, 0.3) !important;
            border: 2px solid var(--verde-claro);
        }
        
        .leaflet-popup-content {
            margin: 0 !important;
            width: 300px !important;
        }

        .leaflet-popup-tip {
            background-color: var(--verde-claro) !important;
        }

        /* --- Contenido del Popup (Tarjetas) --- */
        .card-container {
            display: flex;
            flex-direction: column;
        }
        
        .card-img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-bottom: 4px solid var(--verde-principal);
        }
        
        .card-content {
            padding: 15px;
        }
        
        .card-content h3 { 
            margin: 0 0 5px 0; 
            font-size: 18px; 
            color: var(--verde-oscuro);
            font-weight: 700;
        }
        
        .card-content h4 { 
            margin: 0 0 10px 0; 
            font-size: 12px; 
            color: var(--verde-principal); 
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }
        
        .card-content p { 
            margin: 0; 
            font-size: 13px; 
            line-height: 1.5; 
            color: #4a5568;
        }

        /* --- Marcador Personalizado (Punto Verde Pulsante) --- */
        .marker-pin {
            width: 20px;
            height: 20px;
            background-color: var(--verde-claro);
            border: 3px solid var(--blanco);
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(139, 195, 74, 0.8);
            position: relative;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(139, 195, 74, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(139, 195, 74, 0); }
            100% { box-shadow: 0 0 0 0 rgba(139, 195, 74, 0); }
        }
    </style>
</head>
<body>

<div id="header">
    <div class="header-titles">
        <h1>ATLAS TEXTIL GLOBAL</h1>
        <p>Impacto Ambiental: Los Mayores Cementerios de Ropa</p>
    </div>
    <div class="header-logo">RISE Project</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

<script>
    // 1. Inicializar el mapa
    const map = L.map('map', {
        zoomControl: true
    }).setView([20, 0], 2.5);

    // 2. Capa Visual (Mapa base claro y limpio)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
        subdomains: 'abcd',
        maxZoom: 20
    }).addTo(map);

    // 3. Base de Datos de Ubicaciones (con imágenes funcionales)
    const cementerios = [
        {
            nombre: "Desierto de Atacama",
            pais: "Alto Hospicio, Chile",
            coords: [-20.27, -70.03],
            imagen: "https://images.unsplash.com/photo-1528323273322-d81458248d40?q=80&w=600&auto=format&fit=crop",
            descripcion: "Saturado por 59,000 toneladas anuales de ropa usada. Las prendas de poliéster tardan 200 años en descomponerse, liberando microplásticos en este frágil ecosistema."
        },
        {
            nombre: "Mercado Kantamanto",
            pais: "Accra, Ghana",
            coords: [5.55, -0.21],
            imagen: "https://images.unsplash.com/photo-1542060748-10c28b62716f?q=80&w=600&auto=format&fit=crop",
            descripcion: "El mercado de segunda mano más grande de África. El 40% de lo importado se desecha inmediatamente en vertederos que bloquean canales y acaban en el océano."
        },
        {
            nombre: "Vertedero de Dandora",
            pais: "Nairobi, Kenia",
            coords: [-1.24, 36.89],
            imagen: "https://images.unsplash.com/photo-1611288875781-c37ee91f215f?q=80&w=600&auto=format&fit=crop",
            descripcion: "Recibe hasta 200 toneladas de residuos textiles diarios. La quema accidental de fibras sintéticas libera gases tóxicos que afectan a miles de personas."
        },
        {
            nombre: "Centro de Reciclaje Fallido",
            pais: "Panipat, India",
            coords: [29.39, 76.97],
            imagen: "https://images.unsplash.com/photo-1532996122724-e3c354a0b15b?q=80&w=600&auto=format&fit=crop",
            descripcion: "Conocida como la 'capital del reciclaje', hoy está desbordada porque la calidad de las telas modernas de la moda rápida hace imposible su reutilización."
        },
        {
            nombre: "Punto de Origen (Vertederos)",
            pais: "Estados Unidos",
            coords: [39.82, -98.57],
            imagen: "https://images.unsplash.com/photo-1488459716781-31db52582fe9?q=80&w=600&auto=format&fit=crop",
            descripcion: "Genera más de 17 millones de toneladas de residuos textiles al año. Solo el 15% se recicla; el resto se entierra o se exporta a países en desarrollo."
        },
        {
            nombre: "Exportación de Residuos",
            pais: "Reino Unido",
            coords: [51.50, -0.12],
            imagen: "https://images.unsplash.com/photo-1520111195338-9533353528b3?q=80&w=600&auto=format&fit=crop",
            descripcion: "Uno de los mayores exportadores globales. Gran parte de la ropa donada a la 'caridad' termina financiando el colapso ambiental en África."
        }
    ];

    // 4. Crear el Icono Personalizado (Punto Verde)
    const greenPulseIcon = L.divIcon({
        className: 'custom-div-icon',
        html: '<div class="marker-pin"></div>',
        iconSize: [20, 20],
        iconAnchor: [10, 10],
        popupAnchor: [0, -10]
    });

    // 5. Insertar Marcadores y Ventanas Emergentes
    cementerios.forEach(lugar => {
        const marker = L.marker(lugar.coords, {icon: greenPulseIcon}).addTo(map);
        
        const popupContent = `
            <div class="card-container">
                <img src="${lugar.imagen}" alt="${lugar.nombre}" class="card-img">
                <div class="card-content">
                    <h3>${lugar.nombre}</h3>
                    <h4>${lugar.pais}</h4>
                    <p>${lugar.descripcion}</p>
                </div>
            </div>
        `;
        
        marker.bindPopup(popupContent);
    });
</script>

</body>
</html>
